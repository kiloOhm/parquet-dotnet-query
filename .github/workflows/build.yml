name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"

  pull_request:
    branches:
      - main
    paths-ignore:
      - ".github/ISSUE_TEMPLATE/**"

  workflow_dispatch:

jobs:
  test:
    name: "Unit Tests - Linux x64"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test tests/Parquet.Query.Tests/Parquet.Query.Tests.csproj -c Release -f net8.0

  benchmark:
    name: "Benchmarks - Linux x64"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run Benchmarks
        run: dotnet run -c release --project benchmarks/Parquet.Query.Benchmarks/Parquet.Query.Benchmarks.csproj

  viewer:
    name: "Viewer - Windows x64"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Viewer
        run: dotnet publish tools/Parquet.Query.Viewer/src/Parquet.Query.Viewer/Parquet.Query.Viewer.csproj -c Release -f net10.0-windows10.0.19041.0 -o publish

      - name: Build Viewer (self-contained)
        run: dotnet publish tools/Parquet.Query.Viewer/src/Parquet.Query.Viewer/Parquet.Query.Viewer.csproj -c Release -f net10.0-windows10.0.19041.0 --self-contained -r win-x64 -o publish-portable

      - uses: actions/upload-artifact@v4
        name: Upload Viewer
        with:
          name: viewer-win-x64
          path: publish/

      - uses: actions/upload-artifact@v4
        name: Upload Viewer (portable)
        with:
          name: viewer-win-x64-portable
          path: publish-portable/

  build:
    runs-on: ubuntu-latest
    name: "Build NuGet"
    steps:
      - uses: actions/checkout@v4

      - name: Create variables
        run: |
          VERSION=$(head -n 1 docs/release-notes.md | xargs | tr -d ' #')
          VERSION_MAJOR=$(echo "$VERSION" | cut -d. -f1).0.0
          VERSION_NO_SUFFIX=$(echo "$VERSION" | cut -d- -f1)

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_MAJOR=$VERSION_MAJOR" >> "$GITHUB_ENV"
          echo "VERSION_NO_SUFFIX=$VERSION_NO_SUFFIX" >> "$GITHUB_ENV"

      - name: Print variables
        run: |
          echo "head_ref: ${{ github.head_ref }}"
          echo "run id: ${{ github.run_id }}"
          echo "VERSION: ${{ env.VERSION }}"
          echo "VERSION_MAJOR: ${{ env.VERSION_MAJOR }}"
          echo "VERSION_NO_SUFFIX: ${{ env.VERSION_NO_SUFFIX }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build library
        run: |
          for csproj in src/*/*.csproj; do
            dotnet build "$csproj" -c Release /p:Version=$VERSION /p:FileVersion=$VERSION_NO_SUFFIX.0 /p:AssemblyVersion=$VERSION_MAJOR.0
          done

      - name: Collect artifacts
        run: |
          mkdir artifacts
          cp src/Parquet.Query.Extensions/bin/Release/*.nupkg artifacts/
          cp src/Parquet.Query.Extensions.Indexing/bin/Release/*.nupkg artifacts/
          cp src/Parquet.Query.Extensions.Pooling/bin/Release/*.nupkg artifacts/
          cp src/Parquet.Query/bin/Release/*.nupkg artifacts/
          cp src/Parquet.Query.Extensions.Search/bin/Release/*.nupkg artifacts/
          cp src/Parquet.Query.Extensions.Writing/bin/Release/*.nupkg artifacts/
          awk 'BEGIN{seen=0} /^# /{seen++; if(seen==2) exit; next} seen==1 {print}' docs/release-notes.md > artifacts/release-notes.md
          echo "$VERSION" > artifacts/version.txt

      - uses: actions/upload-artifact@v4
        name: Upload artifacts
        with:
          name: bin
          path: artifacts/*

  release:
    name: "Publish to NuGet"
    runs-on: ubuntu-latest
    needs:
      - test
      - build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download library binaries
        uses: actions/download-artifact@v4
        with:
          name: bin
          path: bin

      - name: Print release notes
        run: cat bin/release-notes.md

      - name: Publish to NuGet
        run: dotnet nuget push bin/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  release-all:
    name: "Make GitHub Release"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - release
      - viewer
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download library binaries
        uses: actions/download-artifact@v4
        with:
          name: bin
          path: bin

      - name: Download viewer
        uses: actions/download-artifact@v4
        with:
          name: viewer-win-x64
          path: viewer-win-x64

      - name: Download viewer (portable)
        uses: actions/download-artifact@v4
        with:
          name: viewer-win-x64-portable
          path: viewer-win-x64-portable

      - name: Restore version from file
        run: echo "VERSION=$(cat bin/version.txt | xargs)" >> "$GITHUB_ENV"

      - name: Package viewer
        run: |
          cd viewer-win-x64 && zip -r ../bin/ParquetViewer-win-x64.zip . && cd ..
          cd viewer-win-x64-portable && zip -r ../bin/ParquetViewer-win-x64-portable.zip . && cd ..

      - name: View artifacts to be used
        run: ls -lh bin/*.zip bin/*.nupkg

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          prerelease: ${{ contains(env.VERSION, '-') }}
          files: |
            bin/*.nupkg
            bin/ParquetViewer-win-x64.zip
            bin/ParquetViewer-win-x64-portable.zip
          body_path: bin/release-notes.md
